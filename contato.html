<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>

<body>
<!--Botão para modo escuro-->
  <button id="btnTema">Modo Escuro</button>  
<!-- Botão de menu-->
<nav class="menu">

  <button id="btnMenu">Menu</button>
<!--Ligação entre as abas do menu-->
  <div id="linksMenu" class="links">
    <a href="index.html">Sobre mim</a>
    <a href="formacao.html">Formação</a>
    <a href="portfolio.html">Portfólio</a>
    <a href="contato.html">Contato</a>
  </div>

</nav>
<!--Conteudo escrito da pagina--> 
<h1>Contato</h1>
<!--Formulario para preencher informações-->
<form id="formContato">

  <label>Nome:</label><br>
  <input type="text" id="nome"><br><br>

  <label>E-mail:</label><br>
  <input type="email" id="email"><br><br>

  <label>Mensagem:</label><br>
  <textarea id="mensagem"></textarea><br><br>

  <button type="submit">Enviar</button>

</form>
<!--Função para atender requisitos do formulario-->
<script>
document.getElementById("formContato").addEventListener("submit", function(event) {
  
  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let mensagem = document.getElementById("mensagem").value;

  if (nome === "" || email === "" || mensagem === "") { //verifica os requisitos
    alert("Por favor, preencha todos os campos!");
    event.preventDefault();  // impede o envio do formulario
  } else {
    alert("Mensagem enviada com sucesso!");
  }

});
</script>
<!--Função para o botão de menu aparecer no mobile-->
<script>
let btnMenu = document.getElementById("btnMenu");
let menu = document.getElementById("linksMenu");

btnMenu.addEventListener("click", function () {
  menu.classList.toggle("ativo");
});
</script>

<!--Função para modo escuro na pagina-->
<script>
let btnTema = document.getElementById("btnTema");

btnTema.addEventListener("click", function () {
  document.body.classList.toggle("dark");
});
</script>
    
</body>
</html>
