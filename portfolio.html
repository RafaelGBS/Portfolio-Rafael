<!DOCTYPE html>
<html lang="en">

</head>

<body>
<!--Botão para modo escuro--> 
  <button id="btnTema">Modo Escuro</button>
<!-- Botão de menu-->
<nav class="menu">

  <button id="btnMenu">Menu</button>
<!--Ligação entre as abas do menu-->
  <div id="linksMenu" class="links">

    <a href="formacao.html">Formação</a>

<!--Função para o botão de menu aparecer no mobile-->
<script>
let btnMenu = document.getElementById("btnMenu");
let menu = document.getElementById("linksMenu");

btnMenu.addEventListener("click", function () {
  menu.classList.toggle("ativo");
});
</script>

<!--Função para modo escuro na pagina-->
<script>
let btnTema = document.getElementById("btnTema");

btnTema.addEventListener("click", function () {
  document.body.classList.toggle("dark");
});
</script>
